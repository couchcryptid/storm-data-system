apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  labels:
    {{- include "storm-data.componentLabels" (dict "ctx" $ "component" "api") | nindent 4 }}
data:
  KAFKA_BROKERS: {{ .Values.global.kafka.brokers | quote }}
  KAFKA_TOPIC: {{ .Values.api.config.topic | quote }}
  KAFKA_GROUP_ID: {{ .Values.api.config.groupId | quote }}
  HTTP_ADDR: {{ .Values.api.config.httpAddr | quote }}
  LOG_LEVEL: {{ .Values.global.logLevel | quote }}
  LOG_FORMAT: {{ .Values.api.config.logFormat | quote }}
  SHUTDOWN_TIMEOUT: {{ .Values.api.config.shutdownTimeout | quote }}
  BATCH_SIZE: {{ .Values.api.config.batchSize | quote }}
  BATCH_FLUSH_INTERVAL: {{ .Values.api.config.batchFlushInterval | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: api-credentials
  labels:
    {{- include "storm-data.componentLabels" (dict "ctx" $ "component" "api") | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "storm-data.databaseUrl" . | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    {{- include "storm-data.componentLabels" (dict "ctx" $ "component" "api") | nindent 4 }}
spec:
  selector:
    {{- include "storm-data.selectorLabels" (dict "component" "api") | nindent 4 }}
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    {{- include "storm-data.componentLabels" (dict "ctx" $ "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "storm-data.selectorLabels" (dict "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "storm-data.selectorLabels" (dict "component" "api") | nindent 8 }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-credentials
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
