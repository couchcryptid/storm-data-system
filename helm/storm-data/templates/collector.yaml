apiVersion: v1
kind: ConfigMap
metadata:
  name: collector-config
  labels:
    {{- include "storm-data.componentLabels" (dict "ctx" $ "component" "collector") | nindent 4 }}
data:
  KAFKA_BROKERS: {{ .Values.global.kafka.brokers | quote }}
  KAFKA_CLIENT_ID: {{ .Values.collector.config.clientId | quote }}
  KAFKA_TOPIC: {{ .Values.collector.config.topic | quote }}
  REPORTS_BASE_URL: {{ .Values.collector.config.reportsBaseUrl | quote }}
  REPORT_TYPES: {{ .Values.collector.config.reportTypes | quote }}
  CRON_SCHEDULE: {{ .Values.collector.config.cronSchedule | quote }}
  LOG_LEVEL: {{ .Values.global.logLevel | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: collector
  labels:
    {{- include "storm-data.componentLabels" (dict "ctx" $ "component" "collector") | nindent 4 }}
spec:
  selector:
    {{- include "storm-data.selectorLabels" (dict "component" "collector") | nindent 4 }}
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
  labels:
    {{- include "storm-data.componentLabels" (dict "ctx" $ "component" "collector") | nindent 4 }}
spec:
  replicas: {{ .Values.collector.replicas }}
  selector:
    matchLabels:
      {{- include "storm-data.selectorLabels" (dict "component" "collector") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "storm-data.selectorLabels" (dict "component" "collector") | nindent 8 }}
    spec:
      containers:
        - name: collector
          image: "{{ .Values.collector.image.repository }}:{{ .Values.collector.image.tag }}"
          imagePullPolicy: {{ .Values.collector.image.pullPolicy }}
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: collector-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.collector.resources | nindent 12 }}
