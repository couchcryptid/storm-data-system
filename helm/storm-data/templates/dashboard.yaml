apiVersion: v1
kind: Service
metadata:
  name: dashboard
  labels:
    {{- include "storm-data.componentLabels" (dict "ctx" $ "component" "dashboard") | nindent 4 }}
spec:
  selector:
    {{- include "storm-data.selectorLabels" (dict "component" "dashboard") | nindent 4 }}
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  labels:
    {{- include "storm-data.componentLabels" (dict "ctx" $ "component" "dashboard") | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      {{- include "storm-data.selectorLabels" (dict "component" "dashboard") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "storm-data.selectorLabels" (dict "component" "dashboard") | nindent 8 }}
    spec:
      containers:
        - name: dashboard
          image: {{ .Values.dashboard.image }}
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html
          configMap:
            name: dashboard-html
