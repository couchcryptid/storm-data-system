apiVersion: v1
kind: ConfigMap
metadata:
  name: etl-config
  labels:
    {{- include "storm-data.componentLabels" (dict "ctx" $ "component" "etl") | nindent 4 }}
data:
  KAFKA_BROKERS: {{ .Values.global.kafka.brokers | quote }}
  KAFKA_SOURCE_TOPIC: {{ .Values.etl.config.sourceTopic | quote }}
  KAFKA_SINK_TOPIC: {{ .Values.etl.config.sinkTopic | quote }}
  KAFKA_GROUP_ID: {{ .Values.etl.config.groupId | quote }}
  HTTP_ADDR: {{ .Values.etl.config.httpAddr | quote }}
  LOG_LEVEL: {{ .Values.global.logLevel | quote }}
  LOG_FORMAT: {{ .Values.etl.config.logFormat | quote }}
  SHUTDOWN_TIMEOUT: {{ .Values.etl.config.shutdownTimeout | quote }}
  BATCH_SIZE: {{ .Values.etl.config.batchSize | quote }}
  BATCH_FLUSH_INTERVAL: {{ .Values.etl.config.batchFlushInterval | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: etl
  labels:
    {{- include "storm-data.componentLabels" (dict "ctx" $ "component" "etl") | nindent 4 }}
spec:
  selector:
    {{- include "storm-data.selectorLabels" (dict "component" "etl") | nindent 4 }}
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etl
  labels:
    {{- include "storm-data.componentLabels" (dict "ctx" $ "component" "etl") | nindent 4 }}
spec:
  replicas: {{ .Values.etl.replicas }}
  selector:
    matchLabels:
      {{- include "storm-data.selectorLabels" (dict "component" "etl") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "storm-data.selectorLabels" (dict "component" "etl") | nindent 8 }}
    spec:
      containers:
        - name: etl
          image: "{{ .Values.etl.image.repository }}:{{ .Values.etl.image.tag }}"
          imagePullPolicy: {{ .Values.etl.image.pullPolicy }}
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: etl-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.etl.resources | nindent 12 }}
