apiVersion: v1
kind: ConfigMap
metadata:
  name: etl-config
  namespace: hailtrace
data:
  KAFKA_BROKERS: "kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
  KAFKA_SOURCE_TOPIC: "raw-weather-reports"
  KAFKA_SINK_TOPIC: "transformed-weather-data"
  KAFKA_GROUP_ID: "storm-data-etl"
  HTTP_ADDR: ":8080"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  SHUTDOWN_TIMEOUT: "10s"
  BATCH_SIZE: "50"
  BATCH_FLUSH_INTERVAL: "500ms"
