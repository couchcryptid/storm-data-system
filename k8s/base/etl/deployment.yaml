apiVersion: apps/v1
kind: Deployment
metadata:
  name: etl
  namespace: hailtrace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etl
  template:
    metadata:
      labels:
        app: etl
    spec:
      containers:
        - name: etl
          image: brendanvinson/storm-data-etl:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: etl-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
            limits:
              memory: 256Mi
