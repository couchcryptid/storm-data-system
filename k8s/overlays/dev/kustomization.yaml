apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: mock-server
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: storm-data-mock-server:latest
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
